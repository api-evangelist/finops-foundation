    name: FOCUS Cost and Usage API
    tags:
      - FinOps
      - Costs
      - Budgets
      - Billing
      - Cloud
      - FOCUS
    humanURL: https://focus.finops.org/
    properties:
      - url: https://focus.finops.org/focus-specification/v1-3/
        type: Documentation
      - url: >-
          openapi/finops-foundation-focus-cost-and-usage-openapi.yml
        type: OpenAPI
      - url: https://github.com/FinOps-Open-Cost-and-Usage-Spec/FOCUS_Spec
        type: GitHubRepository
      - url: https://focus.finops.org/focus-columns/
        type: Documentation
    description: >-
      An API modeled on the FinOps Open Cost and Usage Specification (FOCUS)
      v1.3, the open standard maintained by the FinOps Foundation under the
      Linux Foundation that defines a common schema for cloud, SaaS, and other
      technology billing data. FOCUS normalizes billing datasets across
      providers, defining standardized columns (dimensions and metrics),
      column-specific requirements, and spec-wide attributes. The v1.3
      specification, ratified December 2025, introduces the Contract Commitment
      dataset, split cost allocation columns, and data completeness and recency
      metadata. Major cloud providers including AWS, Azure, GCP, OCI, and
      Tencent support the FOCUS format for billing data exports.
