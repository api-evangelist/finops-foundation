    description: >-
      The FinOps Foundation is a vendor-neutral community under the Linux
      Foundation that advances the practice of cloud financial management
      (FinOps). It stewards the FinOps Framework, common language, and best
      practices that help engineering, finance, and business teams collaborate
      to manage cloud cost and value. The foundation convenes a global community
      through working groups, events, and an active Slack; publishes research
      such as the annual State of FinOps; and maintains standards and open
      specifications like FOCUS to normalize cost and usage data. It also offers
      training and certifications for practitioners and platforms, a tools
      landscape, and practical guidance to help organizations progress from
      visibility to optimization to ongoing operations at scale.
